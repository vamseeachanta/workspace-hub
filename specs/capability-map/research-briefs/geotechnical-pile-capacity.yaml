key_equations:
  - name: "Axial pile capacity (compression)"
    standard: "API_RP_2GEO"
    section: "Sec 7.2"
    latex: "Q_c = Q_f + Q_p = f \\cdot A_s + q \\cdot A_p"
    description: "Total compressive capacity as sum of skin friction (Qf) and end bearing (Qp)"

  - name: "Unit skin friction — cohesive soils (alpha method)"
    standard: "API_RP_2GEO"
    section: "Sec 7.3"
    latex: "f = \\alpha \\cdot s_u"
    description: "Adhesion factor alpha times undrained shear strength for clay"

  - name: "Unit skin friction — cohesionless soils (beta method)"
    standard: "API_RP_2GEO"
    section: "Sec 8.2"
    latex: "f = \\beta \\cdot \\sigma'_v"
    description: "Beta factor times effective vertical stress for sand layers"

  - name: "Unit end bearing — cohesive soils"
    standard: "API_RP_2GEO"
    section: "Sec 7.4"
    latex: "q = N_c \\cdot s_u"
    description: "Bearing capacity factor Nc (typically 9) times undrained shear strength at pile tip"

  - name: "Unit end bearing — cohesionless soils"
    standard: "API_RP_2GEO"
    section: "Sec 8.3"
    latex: "q = N_q \\cdot \\sigma'_v"
    description: "Bearing capacity factor Nq times effective vertical stress at pile tip"

  - name: "Lateral pile response — p-y curves"
    standard: "API_RP_2GEO"
    section: "Sec 9"
    latex: "p = A \\cdot p_u \\cdot \\tanh\\left(\\frac{k \\cdot z \\cdot y}{A \\cdot p_u}\\right)"
    description: "Nonlinear soil resistance (p) as function of lateral displacement (y) for sand"

