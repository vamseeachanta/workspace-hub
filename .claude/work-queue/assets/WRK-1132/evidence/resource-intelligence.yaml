recommendations:
  approach: >
    Two-phase delivery.
    PHASE 1 (MVP — meets all ACs): Build keyword/BM25 search over page-level
    text chunks from curated subset of standards (20-50 key PDFs staged to
    docs/domains/). Ingest with pypdf page-by-page; store as
    data/standards-index/chunks.jsonl. Pre-build BM25 index serialized to
    data/standards-index/bm25.pkl. CLI query-standards.sh loads pkl, ranks
    in <5s. Code family detected from file path regex.
    PHASE 2 (optional): sentence-transformers embeddings + faiss. MCP
    Semantic Scholar for academic gap-fill.

  key_risks:
    - risk: "docs/domains/ does not exist; PDFs only on /mnt/ace/ remote mount"
      mitigation: >
        Build ingestion from og_standards source paths in config.yaml directly.
        Create docs/domains/ as curated staging area with copies or symlinks
        of 20-50 most relevant standards.
    - risk: "Many standards PDFs may be image-based (scanned) — pypdf returns empty text"
      mitigation: >
        Detect empty extraction; log warning with path; skip or index
        filename/doc_number only. WRK-137 confirms this is a real problem.
    - risk: "org field is 'Unknown' for most records — code family unreliable from metadata"
      mitigation: >
        Parse code family from file path via regex: contains dnv, api, abs,
        iso, bs/, norsok (case-insensitive). Use org field as secondary signal.
    - risk: "27,981 og_standards records — full extraction would take hours"
      mitigation: >
        Scope MVP to curated subset. Build incremental ingestion with
        checkpointing (same pattern as phase-a-index.py).
    - risk: "<5s CLI requirement — loading large JSONL on every query is slow"
      mitigation: >
        Pre-serialize BM25 index as pickle. Load at query time (~0.3-0.5s).
        BM25 query itself is microseconds. Total <1s expected for MVP corpus.

  suggested_stack:
    ingestion_library: "pypdf (primary); pdfplumber (fallback)"
    ranking_library: "rank_bm25 (BM25Okapi) — pure Python, no ML"
    chunk_storage: "data/standards-index/chunks.jsonl"
    index_storage: "data/standards-index/bm25.pkl"
    cli_pattern: >
      scripts/standards/query-standards.sh — bash wrapper →
      uv run --no-project --with pypdf --with rank_bm25 python inline heredoc,
      mirroring query-knowledge.sh exactly
    code_family_filter: "Regex on file path: DNV|API|ABS|ISO|BS|NORSOK (case-insensitive)"
    topic_filter: "Keyword tag at ingest from section headings + filename analysis"
    mcp_gap_fill: "Semantic Scholar MCP (.mcp.json already configured)"
    phase_2_embedding: "sentence-transformers/all-MiniLM-L6-v2 + faiss-cpu (optional, future)"
