    description: "docs/ dirs vary per repo — some have MkDocs, some just README.md"
    severity: low
    mitigation: "Search both docs/ and README.md; report per-repo coverage"

design_notes:
  - "check_doc_drift.py reads symbol-index.jsonl; for each unique file, greps docs/ + README.md"
  - "Drift score = undocumented_public_symbols / total_public_symbols per repo"
  - "Staleness = symbol file modified (git log) but docs haven't changed since (docs git log)"
  - "Baseline stored at config/quality/doc-drift-baseline.yaml; drift increase → auto-WRK"
  - "check-all.sh --drift flag calls check_doc_drift.py; outputs drift score summary"
  - "Nightly cron at 02:30 — before comprehensive-learning at 03:00"
