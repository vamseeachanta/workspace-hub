    description: "Symbol index lacks git blame timestamps — staleness requires subprocess git log"
    severity: low
    mitigation: "Use git log --format=%ct -- <file> for mtime; cache per-file"
  - id: R2
    description: "22,697 symbols is large — full doc scan per symbol may be slow"
    severity: medium
    mitigation: "Build inverted index: grep docs once, build set; O(symbols) lookup"
