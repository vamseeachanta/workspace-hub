architecture_assessment:
  checkpoint_write_gap: >
    exit_stage.py validates checkpoint.yaml (non-blocking) but NEVER writes it.
    The checkpoint.sh bash script writes it, but it only captures wrk_id/stage/next_action
    and is called manually. Phase 1 must make exit_stage.py auto-write a rich checkpoint.

  stage_loop_gap: >
    work.sh has no stage loop. Each stage is user-triggered inline in the main Claude
    conversation. Phase 2 would add a loop that spawns Task agents per stage. However,
    this is complex — the orchestrator (main Claude session) still accumulates context
    from managing the loop. The lightweight alternative is: after each stage exit,
    emit a clear "CONTEXT RESET SIGNAL" telling the user to start a new /work run
    message, which loads the checkpoint fresh.

  recommended_approach: >
    Phase 1 (high value, low risk): exit_stage.py writes rich checkpoint after each stage exit.
    Phase 2a (medium value): emit "start new session" prompt at end of each stage exit.
    Phase 2b (deferred): work.sh Task-agent stage loop — only if Phase 2a proves insufficient.
    Phase 3 (low effort): confirm all stage-NN-*.yaml have entry_reads lists (most already do).

