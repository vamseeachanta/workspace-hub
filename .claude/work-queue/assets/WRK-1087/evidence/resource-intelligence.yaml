gaps:
  - scripts/audit/ directory does not exist — needs creation
  - logs/audit/ directory does not exist — needs creation
  - No SHA256-chained JSONL audit mechanism exists anywhere
  - exit_stage.py has no call to any action logger
  - close-item.sh has no call to any action logger

skills:
  core_used:
    - work-queue
    - work-queue-workflow
    - workflow-gatepass
  referenced:
    - session-start
    - wrk-lifecycle-testpack

risks:
  - SHA256 chain requires reading last entry to compute next hash — must handle empty/new file correctly
  - Session ID availability: log-action.sh must tolerate absence (use "unknown" fallback)
  - Hook performance: log-action.sh must complete <500ms (append-only jq write is fast)
  - Monthly rotation: cron or on-write check? On-write check is simpler and avoids cron dependency
  - Compression requires gzip; confirm available on dev-primary (yes, standard)

decisions:
  - Separate from log-gate-event.sh (different format, different purpose)
  - Chain is SHA256 of previous raw JSONL line (not parsed fields)
  - session_id sourced from .claude/state/session.yaml if present, else "unknown"
  - wrk_id sourced from .claude/state/active-wrk if present, else passed via --wrk flag
  - Monthly rotation check on every write (if month changed, close old file)
  - Compression triggered at write time when file is older than 6 months
