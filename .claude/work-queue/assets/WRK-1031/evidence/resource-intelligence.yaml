stage: 2
completion_status: continue_to_planning

domain:
  problem: >
    generate-html-review.py only generates full standalone HTML files (--type plan-draft|plan-final|
    implementation|close). It has no mode to update a single lifecycle HTML stage section.
    This forces agents to produce separate snapshot files alongside the lifecycle HTML,
    creating redundancy and user confusion about which file is canonical.
  architecture_decision: >
    Add --stage N --update mode to generate-html-review.py. The mode parses the existing
    lifecycle HTML, locates <section id="sN">, and replaces/appends the stage-body content
    with fully rendered stage content. After this, snapshot files become redundant and can
    be deleted. Route B: Phase 1 = generator, Phase 2 = migrate WRK-1028/1029 + update skills.

