    "coordinating" to prevent coordinating-status features from disappearing from the index.
  - >
    work-queue/SKILL.md is currently 262 lines. Its pruned target per the plan is ≤250
    lines. Adding a ## Feature Layer section (~20 lines) will push it to ~282 lines.
    The implementing WRK-A child must trim equivalent content or accept the overage and
    update the target comment in the plan.
  - >
    stage-09-routing.yaml is currently a stage-contract descriptor (metadata keys like
    order, name, human_gate) — not a routing decision table. The plan's feature_routing:
    block is a new top-level key that changes the file's semantics. The child WRK-C
    should confirm whether this file is consumed as data by any script before adding
    new keys, to avoid parse errors.
  - >
    dep_graph.py WRKItem dataclass does not include type, children, or parent fields.
    A --feature flag needs either: (a) a separate dataclass, or (b) extending WRKItem
    without breaking existing compute_graph() callers which iterate blocked_by only.
  - >
    whats-next.sh filters by category (default: harness). A "Features in progress"
    section that calls feature-status.sh for coordinating items must either bypass
    the category filter or ensure feature WRKs carry category: harness to appear.
    WRK-1127 has category: harness so this should be fine, but new features in other
    categories would be hidden by default.

