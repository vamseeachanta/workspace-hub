stage: 2
wrk_id: WRK-1362
surveyed_at: "2026-03-20"

existing_code:
  - path: digitalmodel/src/digitalmodel/structural/parachute/parachute_drag.py
    status: production
    capabilities:
      - Single chute drag force (F = 0.5*rho*V^2*Cd*A*Cx)
      - DragResult dataclass with lbs/N
      - Unit conversions (mph_to_fps, chute_area)
    gaps:
      - No dual chute support
      - No Stroud sizing logic
      - No sensitivity analysis (aero lift, traction)

  - path: digitalmodel/src/digitalmodel/structural/parachute/frame_model.py
    status: production
    capabilities:
      - GT1R frame geometry (6 nodes, 6 members — rear trunk only)
      - 4130 chromoly material (63 ksi yield, 97 ksi ultimate)
      - tube_section_properties() for circular hollow sections
    gaps:
      - Under-hood frame (Page 2) not modeled

  - path: digitalmodel/src/digitalmodel/structural/parachute/frame_solver.py
    status: production
    capabilities:
      - 2D frame solver (3 DOF/node: ux, uy, theta)
      - Euler-Bernoulli beam elements
      - Global stiffness assembly, penalty BC method
      - Member end forces in local coordinates
    gaps: []

  - path: digitalmodel/src/digitalmodel/structural/parachute/member_check.py
    status: production
    capabilities:
      - tube_stress, von_mises_tube, unity_ratio
      - bolt_shear_check, weld_throat_check, pin_shear_check
      - check_all_members (batch member checks)
    gaps: []

