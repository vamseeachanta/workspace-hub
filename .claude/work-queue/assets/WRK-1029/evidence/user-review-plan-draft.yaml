decisions:
  q1_domain_fields:
    question: >
      Should domain.problem and domain.architecture_decision be required or optional
      in evidence/resource-intelligence.yaml?
    decision: >
      Required in schema and template. WARN (not FAIL) in verify-gate-evidence.py.
      Capture follow-up WRK to upgrade to FAIL after 3 production runs confirm
      agents fill them correctly.
    rationale: >
      Optional fields regress — agents skip them when gatepass doesn't enforce.
      Required in schema + template forces active completion; WARN phase collects
      real evidence before hard-gating.

  q2_stop_guard_scope:
    question: >
      Should the stop guard apply to Stage 2 only, or also Stage 16
      (Resource Intelligence Update)?
    decision: Both Stage 2 and Stage 16.
    rationale: >
      Same risk in Stage 16 — agent discovers new resources mid-execution and
      starts refactoring instead of recording. Stop guard at both exit points.

