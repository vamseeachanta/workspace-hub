files_consulted:
  # Current skill trees (28 skills total)
  - .claude/skills/coordination/workspace/work-queue/SKILL.md  # root + 17 sub-skills
  - .claude/skills/workspace-hub/work-queue-workflow/SKILL.md  # workflow + stages ref
  - .claude/skills/workspace-hub/workflow-gatepass/SKILL.md    # gatepass + 9 sub-skills
  # Stage micro-skills (20 bare .md files)
  - .claude/skills/workspace-hub/stages/stage-01-capture.md    # through stage-20
  # Stage contracts (20 YAML files)
  - scripts/work-queue/stages/stage-01-capture.yaml            # through stage-20
  # Scripts (72 total: 43 .sh + 29 .py)
  - scripts/work-queue/dispatch-run.sh
