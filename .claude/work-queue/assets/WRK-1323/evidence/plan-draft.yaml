wrk_id: WRK-1323
stage: 4
scripts_over_llm_audit:
  recurring_operations: none
  scripts_to_create: none
  rationale: "Single CLI flag addition — no recurring operations"

acceptance_criteria:
  - id: AC-1
    text: "verify_checklist.py accepts --dry-run flag"
    testable: true
  - id: AC-2
    text: "--dry-run prints checklist items without checking evidence files"
    testable: true
  - id: AC-3
    text: "--dry-run returns exit code 0 regardless of evidence state"
    testable: true
  - id: AC-4
    text: "Normal mode (no --dry-run) behavior unchanged"
    testable: true

pseudocode:
  - step: 1
    description: "Add --dry-run argparse flag (action=store_true)"
  - step: 2
    description: "Pass dry_run param to verify_checklist() function"
  - step: 3
    description: "In verify_checklist(), if dry_run: return items without validation"
  - step: 4
    description: "In CLI main, if dry_run: print items and exit 0"

test_plan:
  - what: "--dry-run prints checklist items for valid stage"
    type: happy
    expected: "Prints 'DRY-RUN: stage N has M checklist items' + item list"
  - what: "--dry-run with no checklist items"
    type: edge
    expected: "Prints 'DRY-RUN: stage N has 0 checklist items'"
  - what: "Normal mode still blocks on missing evidence"
    type: error
    expected: "Exit code 1 with BLOCKED message"
  - what: "--dry-run returns passed=True with items in programmatic API"
    type: happy
    expected: "dict with passed=True, empty blockers, populated items list"
