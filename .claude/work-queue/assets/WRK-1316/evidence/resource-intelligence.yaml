online_research:
  sources_found: 18
  key_patterns:
    - name: "Symfony TransitionBlocker"
      source: "https://symfony.com/doc/current/workflow.html"
      insight: "Collect all failed checklist items into structured blocker list with reasons, not binary pass/fail"
    - name: "Airflow Sensor pattern"
      source: "https://www.getorchestra.io/guides/complete-guide-to-airflow-sensors-and-hooks"
      insight: "Human gates = sensors — checkpoint and release context, resume on explicit signal"
    - name: "Temporal durable execution"
      source: "https://docs.temporal.io/workflow-definition"
      insight: "Persist state at every transition boundary for crash recovery"
    - name: "LangGraph state machine agents"
      source: "https://docs.langchain.com/oss/python/langgraph/workflows-agents"
      insight: "Add low-cost validators before expensive tool calls; conditional edges per state"
    - name: "Azure AI Agent deterministic orchestration"
      source: "https://learn.microsoft.com/en-us/azure/architecture/ai-ml/guide/ai-agent-design-patterns"
      insight: "Tool availability must be deterministic per stage, not left to LLM choice"
    - name: "Claude Code hooks (PreToolUse/PostToolUse)"
      source: "https://code.claude.com/docs/en/hooks-guide"
      insight: "Native enforcement mechanism — three handler types map to enforcement gradient"
    - name: "Kestra Checks concept"
      source: "https://kestra.io/features/declarative-data-orchestration"
      insight: "Pre-execution checks inline with stage definition — self-contained config"
    - name: "Mermaid stateDiagram-v2"
      source: "https://mermaid.ai/open-source/syntax/stateDiagram.html"
      insight: "Use composite states for stage groups; <<choice>> at every exit for gate visualization"

  cross_cutting_insights:
    - "Enforcement gradient confirmed by industry: Symfony guards (script) → Airflow sensors (process) → Claude hooks (agent)"
    - "Stage transitions must be deterministic — validates scripts-over-LLM rule"
    - "Checklist as blocker, not suggestion — TransitionBlocker pattern"
    - "Checkpoint at every boundary — Temporal durable execution"
    - "Tool scoping per stage is emerging best practice — LangGraph + Azure patterns"

