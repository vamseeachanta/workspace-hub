  - id: WRK-1261
    title: "Quantify skill curation quality hierarchy"
    priority: high
    impact: "Encodes scripts > refs > single > large hierarchy into eval tooling"
    rationale: >
      patterns.md enforcement gradient (prose → micro-skill → script → hook)
      is not measured per-skill. This makes curation subjective. WRK-1261 adds
      quality_tier scoring so every skill has a measurable position on the gradient,
      and Tier D skills are flagged for decomposition into script + micro-skill.
