recommended_approach:
  tier1_markers:
    description: "Add @pytest.mark.live_data to pytest.ini + tag all 12 failing assethold tests"
    effort: low
    outcome: "Tests categorized; can be excluded with -m 'not live_data'"
  tier2_responses_library:
    description: "Use responses library to intercept HTTP calls; wire assethold conftest fixtures to tests"
    effort: medium
    outcome: "Tests run deterministically without network; existing mocks leveraged"
    dependency: "Add responses>=0.24.0 to assethold pyproject.toml test group"
  tier3_stub_data:
    description: "Manual JSON fixture files for each test; fallback if responses library insufficient"
    effort: high
    outcome: "Fully deterministic; higher maintenance burden"

