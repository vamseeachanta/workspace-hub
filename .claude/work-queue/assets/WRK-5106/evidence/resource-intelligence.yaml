scope_estimate: |
  Two-phase scope:
  Phase 1 (primary): Write backfill-issues.sh that:
    - Fetches all ~1256 GitHub issues via gh issue list
    - Extracts WRK ID from each issue title
    - Finds matching local WRK .md file
    - Calls update-github-issue.py --update for each match
    - Rate limits (sleep between calls, ~1256 issues at 0.5s = ~10 min)
    - Dry-run mode, resume-on-failure, summary report
  Phase 2 (secondary): Backfill github_issue_ref into WRK files that lack it
    - For issues matched by title but missing stored ref, write the URL back
  Estimated deliverables: 1 new script (~120-150 lines bash)
  Estimated API calls: ~1256 reads + ~1256 writes = ~2512 (well within 5000/hr limit)
  Risk: Some WRK files may not have enough content to render a useful template body
