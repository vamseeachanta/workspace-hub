key_findings:
  - Retroactive approval fabrication is the #1 failure class (9/10 WRKs audited): the
    gate verifier checks artifact presence but not timestamp ordering, midnight UTC,
    elapsed-time minimums, or date-only values — all 14 gaps in verify-gate-evidence.py
    are unimplemented.
  - Codex hard gate is bypassed in 40% of WRKs: the cross-review gate accepts any
    review.md regardless of provider — Codex keyword check (gap #4) is entirely absent.
  - Sentinel value "unknown" in activation.yaml/claim-evidence.yaml passes the verifier
    because check_activation_gate() checks for non-empty string, which "unknown" satisfies.
    claim-item.sh falls back to "unknown" when session-state.yaml is unavailable.
  - Stage 1 has no exit gate: the agent writes the WRK file and auto-advances to Stage 2
    with no user confirmation of scope. R-25 (user-review-capture.yaml) is defined but
    not enforced by any script or verifier check.
  - Stage gate policy exists only as prose in session-audit-master.md addenda (R-26/R-27).
    No machine-readable stage-gate-policy.yaml exists; work-queue-workflow/SKILL.md does
    not yet reflect the Stage 1 gate or conditional pause rule.
  - close-item.sh does not shell-block on execute.yaml absence or timestamp ordering (R-08);
    it relies entirely on verify-gate-evidence.py --stage17-check, which itself does not
    check cross-artifact timestamp ordering (gap #1).
  - workflow-html/SKILL.md and work-queue/SKILL.md both exceed the 400-line hard limit
    (572 and 985 lines respectively); work-queue/SKILL.md is nearly 2.5x the limit.
  - No template exists for user-review-capture.yaml (Stage 1) or stage-gate-policy.yaml.
  - user-review-close-template.yaml is missing; Stage 17 bootstrap in claim-item.sh
    uses inline heredoc rather than a reusable template.
  - spawn-team.sh (45 lines, new/untracked) is minimal — recipe-printer only, no gate
    integration; low risk for WRK-1035 scope.
  - Positive signals to preserve: gate verifier consistently run (all 10 WRKs), TDD
    adherence strong, legal scan 100% pass rate, future-work.yaml schema broadly correct,
    browser-open step not skipped (only the blocking wait is missing).

risks:
  - Implementing timestamp ordering checks (gap #1) will cause existing WRK assets to
    fail retrospective verification if ever re-run; plan must not apply new checks to
    archived items retroactively.
  - Codex keyword enforcement (gap #4 / R-05) combined with Codex unavailability blocking
    (R-06) could deadlock WRKs on ace-linux-1 where Codex interactive terminal is
    unavailable — WRK-1021 (scheduled jobs / cross-review scheduling) is an upstream
    dependency for a full fix; WRK-1035 should add the check but document the ace-linux-1
    Codex constraint.
  - Sentinel value rejection (gap #5) applied to claim-item.sh will cause existing
    session-state.yaml fallback path to block claims on machines where session-state.yaml
    is absent; claim-item.sh fix (R-10) needs a graceful fallback or environment variable
    alternative (CLAUDE_SESSION_ID).
  - work-queue/SKILL.md at 985 lines is a pruning candidate but is the most-referenced
    skill in the cluster; any split must preserve all cross-references in dependent skills
    and CLAUDE.md.
  - Adding Stage 1 gate (user-review-capture.yaml) changes the WRK creation flow for all
    future WRKs; existing WRKs in pending/ may not have this file — exemption or migration
    plan needed (similar to stage5-migration-exemption-template.yaml pattern).
  - 14 gate verifier gaps are all in one 1208-line file; adding all checks risks
    exceeding 400-line soft limit further and complicates test coverage — batch by
    priority (gaps 1-6 first, gaps 7-14 second) as noted in session-audit-master.md.
