gate_verifier:
  existing_checks:
    - check_claim_gate: claim-evidence.yaml / claim.yaml presence and field validation
    - check_stage5_evidence_gate: user-review-plan-draft.yaml presence, reviewed/approved
      booleans, artifact existence (activation controlled by stage5-gate-config.yaml)
    - check_stage7_evidence_gate: plan-final-review confirmation block in lifecycle HTML
    - check_stage17_evidence_gate: user-review-close.yaml reviewer/reviewed_at/confirmed_at
      non-empty, decision not "pending"
    - check_resource_intelligence_gate: resource-intelligence.yaml completion_status +
      skills.core_used list with >=3 entries
    - check_future_work_gate: future-work.yaml recommendations[] with disposition/captured
    - check_resource_intelligence_update_gate: resource-intelligence-update.yaml existence
    - check_user_review_close_gate: reviewer/reviewed_at/confirmed_at/decision fields
    - check_html_open_default_browser_gate: user-review-browser-open.yaml events per stage
    - check_user_review_publish_gate: user-review-publish.yaml per-stage published_at/hash
    - check_activation_gate: activation.yaml wrk_id/set_active_wrk/session_id/orchestrator_agent
      non-empty (but does NOT reject "unknown" sentinel — gap #5)
    - check_reclaim_gate: reclaim.yaml with valid reclaim_decision (emits WARN on absence,
      not n/a — gap #11)
    - check_execute_integrated_tests_gate: execute.yaml integrated_repo_tests 3-5 count
      with name/scope/command/result/artifact_ref and scope in integrated|repo
    - check_plan_confirmation: lifecycle HTML Stage 7 section confirmed_by/confirmed_at/
      decision fields at line-start
    - check_stage_evidence_gate: stage_evidence_ref frontmatter field + file existence +
      stages 1-20 presence with allowed statuses (does NOT verify evidence path existence
      on disk — gap #7)
    - check_agent_log_gate: WRK-NNN-*.log presence in logs/
    - Workstation contract gate: plan_workstations + execution_workstations non-empty
      (passes with "missing" detail rather than hard FAIL — gap #10)
    - Cross-review gate: any review.md/review.html artifact presence (no Codex keyword
      check — gap #4)
    - TDD gate: test file presence scan
    - Legal gate: legal-scan.md with PASS content
    - Integrated test gate: execute.yaml integrated_repo_tests 3-5

