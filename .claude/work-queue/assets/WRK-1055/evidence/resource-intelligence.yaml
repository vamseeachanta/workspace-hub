      notes: "5804+ listings; Data Science & ML category well-populated."

  known_mcp_candidates:
    - id: semantic_scholar_mcp
      name: "Semantic Scholar MCP Server"
      url: "https://github.com/FujishigeTemma/semantic-scholar-mcp"
      engineering_relevance: high
      install_complexity: low
      auth_required: false
      runtime: uv
      install_command: >
        uv run --with "git+https://github.com/FujishigeTemma/semantic-scholar-mcp"
        semantic-scholar-mcp serve
      claude_add_command: >
        claude mcp add semantic-scholar-mcp -s project --
        uv run --with "git+https://github.com/FujishigeTemma/semantic-scholar-mcp"
        semantic-scholar-mcp serve
      version_pin_note: "No tagged releases; must pin to a specific commit SHA at install time"
      notes: "Wraps S2AG API — 200M+ papers, topic/year/OA-filter search. uv runtime matches toolchain."
      trust_flags:
        - "No releases — install from main; pin commit SHA"
        - "Permissions: read-only calls to api.semanticscholar.org, no file system access"
        - "Single-contributor repo; source code review required before wiring into settings"
      related_wrk: WRK-579

    - id: arxiv_mcp_candidate
      name: "arXiv MCP wrapper (community)"
      engineering_relevance: high
      install_complexity: medium
      auth_required: false
      blocker: "No first-party server; WRK-578 registry audit needed to find vetted wrapper"

    - id: bsee_api_candidate
      name: "BSEE/BOEM Offshore Data API wrapper"
      engineering_relevance: high
      install_complexity: high
      auth_required: false
      blocker: "No MCP server exists — custom development, separate WRK required"

  existing_config:
