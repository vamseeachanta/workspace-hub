  - "Trust assessment (source code review) deferred to execution stage"
  - "Node.js/npx availability on ace-linux-1 not confirmed (uv servers are fine)"

risks:
  - id: supply_chain
    severity: high
    description: >
      Untrusted MCP servers can read full agent context and exfiltrate prompts/secrets.
      Every server needs documented trust assessment before wiring into Claude settings.
  - id: no_pinned_release
    severity: medium
    description: >
      semantic-scholar-mcp has no tagged releases. Must pin commit SHA at install time
      and record in mcp-servers.yaml.
  - id: toolchain_dependency
    severity: low
    description: >
      Future servers may require npx/node. workspace-hub standard is uv.
      semantic-scholar-mcp uses uv — safe. Check future servers.

recommendations:
  start_with: semantic_scholar_mcp
  reason: >
    Lowest install complexity, free, no auth, uv runtime, 200M papers — immediately
    useful for any engineering WRK needing literature references.
  additional_candidates:
    - id: arxiv_mcp_candidate
      priority: medium
      blocker: "WRK-578 registry audit first"
    - id: bsee_api_candidate
      priority: medium
      blocker: "Separate WRK for custom wrapper"
  plan_deliverables_confirmed:
    - "config/ai-tools/mcp-servers.yaml — new file (follows subscriptions.yaml pattern)"
    - ".claude/docs/mcp-servers.md — usage patterns + trust assessment template"
    - "semantic_scholar_mcp installed, commit-pinned, tested with engineering query"
    - "mcpServers block added to /home/vamsee/.claude/settings.json"
