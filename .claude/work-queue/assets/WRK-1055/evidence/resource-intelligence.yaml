      notes: >
        ~2000 servers; 407% growth since September 2025 launch. Backed by Anthropic,
        GitHub, PulseMCP, Microsoft. Programmatic API for server discovery. Primary
        source for execution-stage engineering-keyword scan.
    - name: "Awesome MCP Servers"
