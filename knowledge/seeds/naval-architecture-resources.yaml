# ─────────────────────────────────────────────
# SHIP PLANS (maritime.org)
# ─────────────────────────────────────────────
ship_plans:
  source: "https://maritime.org/doc/plans/index.php"
  local_dir: "/mnt/ace/docs/_standards/SNAME/ship-plans/"
  count: 107
  description: >
    Historical US Navy and Allied vessel general arrangement / inboard profile drawings
    scanned by San Francisco Maritime National Park Association. Covers 1863–2008.
    Includes battleships, carriers, destroyers, submarines, coast guard, and research vessels.
  categories:
    - US Navy combatants (BB, CV, DD, SS, CG, etc.)
    - US Coast Guard (WAGL, WLB, WPC, etc.)
    - Allied vessels (RN, RCN)
    - Commercial / research (Liberty cargo, NS Savannah, NOAA vessels)

