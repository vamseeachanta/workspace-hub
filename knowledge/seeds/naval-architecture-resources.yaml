    url: "https://libguides.usna.edu/c.php?g=410506&p=8554464"
    notes: "Links to ship registers, LOC resources, Lloyd's Register Foundation, National Archives plans."

  - title: "USNA Nimitz Library — Naval Architecture Tools & Databases"
    url: "https://libguides.usna.edu/c.php?g=410506&p=2795318"
    notes: "Knovel access, ABS Rules, US Army Corps Coastal Engineering Manual, key textbook list."

  - title: "National Archives — Ship Plans"
    url: "https://www.archives.gov/research/cartographic/ship-plans"
    notes: "Naval engineering drawings 1790s–Korean War. Free browse, prints on request."

  - title: "Lloyd's Register Foundation Heritage & Education Centre"
    url: "https://hec.lrfoundation.org.uk/archive-library/digital-resources"
    notes: "Historic Lloyd's Register editions, ship plans, survey reports."

  - title: "Internet Archive — Naval Architecture Collection"
    url: "https://archive.org/search?query=naval+architecture&mediatype=texts"
    notes: >
      Large collection including Comstock 1942, PNA Vol II (freely downloadable).
      Gillmer, Baxter, Lewis, PNA Vol III are borrow-only (restricted access).

