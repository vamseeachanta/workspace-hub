    effective_from: "2026-01-01"
    input_per_1m: 0.50
    output_per_1m: 1.50
  gpt-5.4:
    provider: codex
    effective_from: "2026-01-01"
    input_per_1m: 0.50
    output_per_1m: 1.50
  gemini-2.5-pro:
