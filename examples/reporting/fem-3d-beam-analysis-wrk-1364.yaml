metadata:
  title: "3D FEM Beam Analysis — GT1R Parachute Mounting Frame"
  doc_id: "CALC-WRK-1364"
  revision: 1
  date: "2026-03-22"
  author: "Vamsee Achanta"
  status: draft
  project: "GT1R R35 Parachute Frame — WRK-5082"
  change_log:
    - rev: 1
      date: "2026-03-22"
      description: "Initial 3D FEM beam analysis — B32R elements, PIPE section, 3 load cases"

scope:
  objective: |
    Perform 3D finite element beam analysis of the GT1R R35 parachute mounting frame
    using CalculiX B32R Timoshenko beam elements with PIPE cross-section to determine
    stress distribution, deformation, load distribution across members, and reaction
    forces under parachute drag loading.
  inclusions:
    - "3D beam FEM with 15 nodes, 16 B32R elements, and PIPE cross-section"
    - "Three load cases: 200 MPH single chute, 250 MPH single chute, 250 MPH dual chute"
    - "Von Mises stress distribution and utilisation ratios"
    - "Load distribution and strain across all frame members"
    - "Reaction forces at all boundary condition nodes (C3 fixed, B1 bolted)"
  exclusions:
    - "Nonlinear material behavior (elastic analysis only)"
    - "Connection detail stress (bolt holes, weld toes — see WRK-1367)"
    - "Dynamic/impact loading (static equivalent applied)"
    - "Buckling analysis"
  limitations:
    - "Linear elastic analysis — utilisation > 1.0 indicates yield exceedance, not actual failure"
    - "PIPE section assumes uniform wall thickness; local thinning at bends not modeled"
    - "B32R reduced integration may underestimate peak stress at sharp transitions"
  validity_range: "Elastic regime only; results valid for utilisation < 1.0"

design_basis:
  codes:
    - "CalculiX v2.21 — Timoshenko beam theory (B32R element)"
    - "ASTM A519 — 4130 chromoly steel mechanical properties"
  design_life: "N/A — single-event deployment loading"
  safety_class: "High — driver safety system"
  environment: "Sea-level atmosphere; ambient temperature (no thermal effects)"

