  - name: "Max Von Mises — Case 3 (250 MPH dual, GOVERNING)"
    symbol: "\\sigma_{vm,3}"
    value: 419703
    unit: "psi"
    pass_fail: "FAIL"
    limit: 63000
    notes: "Utilisation 6.66 — exceeds yield by 6.7×"
