order: 5
name: User Review - Plan Draft
weight: heavy
invocation: human_interactive
human_gate: true
parallelism: parallel
gate_file: evidence/user-review-plan-draft.yaml
gate_field: decision
gate_value: approved
skills_required:
  - workspace-hub/work-queue-workflow
  - superpowers/brainstorming
entry_reads:
  - assets/WRK-NNN/WRK-NNN-lifecycle.html#s1-s4
exit_artifacts:
  - assets/WRK-NNN/evidence/user-review-plan-draft.yaml
  # Route B/C only:
  - assets/WRK-NNN/plan_claude.md
  - assets/WRK-NNN/plan_codex.md
  - assets/WRK-NNN/plan_gemini.md
blocking_condition: "user-review-plan-draft.yaml missing or decision != approved"
log_action: plan_draft_reviewed
context_budget_kb: 16
lm_judgment_required:
  - id: N1
    rule: "Section-by-section plan dialogue was thorough (not drop-and-approve)"
    why_not_scriptable: "Quality of conversation — no artifact captures dialogue depth"
    mitigation: "Agent must log each section discussed in user-review-plan-draft.yaml decision_log"
  - id: N4
    rule: "Multi-agent plan synthesis (Route B/C) merged all 3 agents views fairly"
    why_not_scriptable: "Content comparison requires semantic judgment"
    mitigation: "Synthesis diff table required in plan.md before approval"
