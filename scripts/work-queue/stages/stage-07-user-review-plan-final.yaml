    text: "All P1 findings resolved"
    requires_human: false
  - id: CL-07-3
    text: "All user-requested changes applied"
    requires_human: false
  - id: CL-07-4
    text: "Explicit user approval received (I approve stage 7)"
    requires_human: true
pre_exit_hooks:
