# stage17-gate-config.yaml — Stage 17 gate activation and operational settings
#
# OWNERSHIP: This file is owned by WRK-1034 and requires paired-WRK change control.
# Any modification to gate_activation_commit, activation, or human_authority_allowlist
# must reference a WRK item in the change note and be approved by a human authority.
#
# COMPATIBILITY: close-item.sh reads activation state from this file via --stage17-check.
# No caller may invent a private enablement flag outside this config.

schema_version: "1.0"
owned_by_wrk: WRK-1034
last_updated: "2026-03-08T00:00:00Z"
change_note: "Initial config; activation=full — immediate enforcement (WRK-1034)"

# Activation enum: disabled | full
# - disabled: no Stage 17 check enforced
# - full: close-item.sh enforces user-review-close.yaml gate before closing
activation: full

gate_activation_commit: ""

checker_timeout_seconds: 30
git_history_timeout_seconds: 8

# Human authority allowlist: only these identities are accepted as reviewer in
# user-review-close.yaml. Agent identities (claude, codex, gemini) are not permitted.
human_authority_allowlist:
  - user
  - vamsee
